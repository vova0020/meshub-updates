server {
    listen 80;
    server_name updates.meshub.com;  # Замените на ваш домен

    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name updates.meshub.com;  # Замените на ваш домен

    # SSL сертификаты (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/updates.meshub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/updates.meshub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/meshub-updates-access.log;
    error_log /var/log/nginx/meshub-updates-error.log;

    # Максимальный размер загружаемого файла
    client_max_body_size 500M;

    # Proxy к Node.js серверу
    location / {
        proxy_pass http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Таймауты для больших файлов
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        proxy_pass http://localhost:3100;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
